{% extends "base.html" %}

{% block login_content %}
<div style="width: 100%; max-width: 440px; padding: 24px;">
    <div class="glass-card p-5 border-0 shadow-lg text-center bg-white" style="border-radius: 32px;">
        <div class="mb-5">
            <div class="d-inline-flex align-items-center justify-content-center bg-orange-soft p-4 rounded-circle mb-4">
                <i class="bi bi-shield-lock-fill text-orange fs-1"></i>
            </div>
            <h2 class="fw-bold text-dark letter-spacing-tight">Добро пожаловать</h2>
            <p class="text-muted small">Вход в панель управления проектами</p>
        </div>

        {% if error %}
        <div class="alert alert-danger border-0 rounded-4 small mb-4 py-3" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
        </div>
        {% endif %}

        <form method="post" action="" class="text-start">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label small fw-bold text-muted ps-2 mb-2">ЛОГИН</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-0 ps-3 rounded-start-4"><i
                            class="bi bi-person text-muted"></i></span>
                    <input type="text" name="username" class="form-control bg-light border-0 p-3 rounded-end-4"
                        placeholder="Ваш логин" required autofocus>
                </div>
            </div>
            <div class="mb-5">
                <label class="form-label small fw-bold text-muted ps-2 mb-2">ПАРОЛЬ</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-0 ps-3 rounded-start-4"><i
                            class="bi bi-key text-muted"></i></span>
                    <input type="password" name="password" class="form-control bg-light border-0 p-3 rounded-end-4"
                        placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit"
                class="btn-modern-primary w-100 py-3 rounded-4 shadow-sm border-0 fw-bold letter-spacing-wide">
                ВОЙТИ В СИСТЕМУ
            </button>
        </form>

        <div class="mt-5">
            <p class="text-muted" style="font-size: 0.7rem;">ИС АВТОМАТИЗАЦИИ УЧЕТА &copy; 2026</p>
        </div>
    </div>
</div>

<style>
    .bg-orange-soft {
        background-color: #fff7ed;
    }

    .text-orange {
        color: #f97316 !important;
    }

    .letter-spacing-tight {
        letter-spacing: -0.025em;
    }

    .letter-spacing-wide {
        letter-spacing: 0.05em;
    }
</style>
{% endblock %}
